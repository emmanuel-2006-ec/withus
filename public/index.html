<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>with-us AI · Nexus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(108, 99, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 99, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { width: 300px; height: 300px; background: #6c63ff; top: -100px; right: -100px; }
        .orb-2 { width: 400px; height: 400px; background: #ff6b6b; bottom: -150px; left: -150px; opacity: 0.2; }

        #loginScreen {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }
        .login-card {
            background: rgba(20, 20, 35, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(108, 99, 255, 0.25);
            border-radius: 32px;
            padding: 48px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 60px rgba(108,99,255,0.05);
            text-align: center;
        }
        .login-card .logo {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-card .subtitle { color: #8b8ba5; font-size: 14px; margin-bottom: 32px; }
        .login-card .subtitle span { color: #6c63ff; }
        .login-card input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            margin-bottom: 12px;
        }
        .login-card input:focus {
            border-color: #6c63ff;
            background: rgba(108,99,255,0.08);
            box-shadow: 0 0 30px rgba(108,99,255,0.05);
        }
        .login-card .btn-join {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-card .btn-join:hover { transform: scale(1.02); box-shadow: 0 0 40px rgba(108,99,255,0.3); }
        .login-card .footer-note { margin-top: 20px; font-size: 12px; color: #555; }

        #chatApp {
            display: none;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 820px;
            background: rgba(15,15,25,0.9);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .chat-header {
            background: rgba(20,20,40,0.8);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .chat-header .avatar {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #6c63ff, #3f3d8a);
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 22px;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(108,99,255,0.2);
        }
        .chat-header .info { flex: 1; }
        .chat-header .info h3 { font-size: 16px; font-weight: 700; color: #fff; }
        .chat-header .info p {
            font-size: 12px;
            color: #8b8ba5;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-header .info p .dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .chat-header .badge {
            background: rgba(108,99,255,0.15);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 600;
            color: #6c63ff;
            border: 1px solid rgba(108,99,255,0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #6c63ff; border-radius: 4px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message .sender {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(108,99,255,0.15);
        }
        .message.user .sender { opacity: 0.8; color: #fff; }
        .message.bot {
            align-self: flex-start;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.04);
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            max-width: 92%;
        }
        .message.bot .sender { color: #6c63ff; }
        .message.system {
            align-self: center;
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            color: #ffd700;
            font-style: italic;
            max-width: 90%;
            text-align: center;
            border-radius: 100px;
            padding: 6px 20px;
            font-size: 13px;
        }
        .message.group {
            align-self: flex-start;
            background: rgba(0, 200, 255, 0.06);
            border: 1px solid rgba(0, 200, 255, 0.08);
            color: #b0e0ff;
            border-bottom-left-radius: 4px;
        }
        .message.group .sender { color: #4fc3f7; }
        .message .time {
            font-size: 10px;
            opacity: 0.3;
            margin-top: 6px;
            display: block;
            text-align: right;
        }
        .message.bot a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 600;
        }
        .message.bot a:hover { text-decoration: underline; }
        .message .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #6c63ff, #4f46e5);
            color: #fff;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .message .download-btn:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(108,99,255,0.2); }

        .message .player-wrapper {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            max-width: 100%;
        }
        .message .player-wrapper audio,
        .message .player-wrapper video {
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            background: #1a1a2e;
        }

        .typing-indicator {
            align-self: flex-start;
            background: rgba(255,255,255,0.03);
            padding: 10px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            display: none;
            color: #8b8ba5;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .chat-input {
            display: flex;
            gap: 10px;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 100px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .chat-input input:focus {
            background: rgba(255,255,255,0.06);
            border-color: rgba(108,99,255,0.3);
        }
        .chat-input button {
            padding: 12px 24px;
            border: none;
            border-radius: 100px;
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .chat-input button:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(108,99,255,0.15); }
        .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .status-bar {
            background: rgba(0,0,0,0.4);
            padding: 6px 18px;
            font-size: 11px;
            color: #555;
            border-top: 1px solid rgba(255,255,255,0.02);
            text-align: center;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
        }
        .status-bar .left { color: #6c63ff; font-weight: 600; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 500px) {
            #loginScreen { padding: 16px; }
            .login-card { padding: 32px 20px; }
            #chatApp { max-height: 100vh; border-radius: 0; border: none; }
            .chat-header { padding: 14px 16px; }
            .chat-messages { padding: 16px 14px; }
            .message { max-width: 92%; }
            .message .player-wrapper audio,
            .message .player-wrapper video { max-height: 200px; }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div id="loginScreen">
        <div class="login-card">
            <div class="logo">WITH-US</div>
            <div class="subtitle"><span>✦</span> Porwerfull with us AI <span>✦</span></div>
            <input type="text" id="loginNameInput" placeholder="Enter your callsign.(profile name.." autocomplete="off" maxlength="30" />
            <button class="btn-join" id="joinBtn">⟡ Get in ⟡</button>
            <div class="footer-note">Your identity stays within this device.</div>
        </div>
    </div>

    <div id="chatApp">
        <div class="chat-header">
            <div class="avatar">◆</div>
            <div class="info">
                <h3>with-us AI · Nexus</h3>
                <p><span class="dot"></span><span id="headerUsername">Loading...</span></p>
            </div>
            <span class="badge">● LIVE</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="sender">⚡ SYSTEM</div>
                Welcome to <strong>with-us AI</strong>.<br /><br />
                Type <strong>hello</strong> to get started.<br />
                Type <strong>.assist</strong> for all commands.
                <span class="time">Just now</span>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">🤖 Bot is generating response...</div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder=".search, .task, .me, or just say hello..." />
            <button id="sendBtn">Send</button>
        </div>

        <div class="status-bar">
            <span class="left" id="userStatus">◆ 4 downloads left</span>
            <span id="userIdDisplay">ID: --</span>
        </div>
    </div>

    <script>
        // ----------------------------------------------
        // CORE LOGIC
        // ----------------------------------------------

        const loginScreen = document.getElementById('loginScreen');
        const chatApp = document.getElementById('chatApp');
        const loginInput = document.getElementById('loginNameInput');
        const joinBtn = document.getElementById('joinBtn');

        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const userStatus = document.getElementById('userStatus');
        const userIdDisplay = document.getElementById('userIdDisplay');
        const headerUsername = document.getElementById('headerUsername');

        let userId = localStorage.getItem('userId');
        let username = localStorage.getItem('username');
        let seenAnnouncements = new Set();
        let seenGroupMessages = new Set();

        if (userId && username) {
            loginScreen.style.display = 'none';
            chatApp.style.display = 'flex';
            headerUsername.textContent = `👤 ${username}`;
            userIdDisplay.textContent = `ID: ${userId}`;
            userStatus.textContent = `◆ ${username} | 4 downloads left`;
            messageInput.focus();
            fetchAnnouncements();
            fetchGroupMessages();
            setInterval(fetchAnnouncements, 30000);
            setInterval(fetchGroupMessages, 5000);
        } else {
            loginScreen.style.display = 'block';
            chatApp.style.display = 'none';
            loginInput.focus();
        }

        function handleLogin() {
            const name = loginInput.value.trim();
            if (!name) {
                loginInput.style.borderColor = '#ff6b6b';
                loginInput.placeholder = '⚠️ Enter your name!';
                setTimeout(() => {
                    loginInput.style.borderColor = '';
                    loginInput.placeholder = 'Enter your callsign...';
                }, 1500);
                return;
            }
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substr(2, 8);
                localStorage.setItem('userId', userId);
            }
            username = name;
            localStorage.setItem('username', username);

            loginScreen.style.opacity = '0';
            loginScreen.style.transform = 'scale(0.95)';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                chatApp.style.display = 'flex';
                void chatApp.offsetWidth;
                chatApp.style.animation = 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                headerUsername.textContent = `👤 ${username}`;
                userIdDisplay.textContent = `ID: ${userId}`;
                userStatus.textContent = `◆ ${username} | 4 downloads left`;
                messageInput.focus();
                fetchAnnouncements();
                fetchGroupMessages();
                setInterval(fetchAnnouncements, 30000);
                setInterval(fetchGroupMessages, 5000);
            }, 400);
        }

        loginInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
        joinBtn.addEventListener('click', handleLogin);

        // ----------------------------------------------
        // MESSAGING ENGINE
        // ----------------------------------------------
        function addMessage(text, sender = 'user', extraClass = '') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender} ${extraClass}`;
            let formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');

            let senderDisplay = '';
            if (sender === 'user') senderDisplay = `👤 ${username}`;
            else if (sender === 'bot') senderDisplay = `⚡ with-us AI`;
            else if (sender === 'group') senderDisplay = `💬 ${text.match(/^@(.*?):/)?.[1] || 'Group'}`;

            let html = '';
            if (senderDisplay && sender !== 'group') html += `<div class="sender">${senderDisplay}</div>`;
            html += formattedText;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            html += timeSpan.outerHTML;
            messageDiv.innerHTML = html;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addMediaMessage(text, filename, fileData, mimeType) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            let formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');

            let html = `<div class="sender">⚡ with-us AI</div>`;
            html += formattedText;
            
            // Add player
            const dataUrl = `data:${mimeType};base64,${fileData}`;
            if (mimeType.startsWith('audio/')) {
                html += `<div class="player-wrapper"><audio controls preload="metadata"><source src="${dataUrl}" type="${mimeType}"></audio></div>`;
            } else if (mimeType.startsWith('video/')) {
                html += `<div class="player-wrapper"><video controls preload="metadata"><source src="${dataUrl}" type="${mimeType}"></video></div>`;
            }
            
            // Add download button
            html += `<br><a href="${dataUrl}" download="${filename}" class="download-btn">⬇ Download File</a>`;
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            html += timeSpan.outerHTML;
            
            messageDiv.innerHTML = html;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function triggerDownload(filename, base64Data, mimeType) {
            // This is now handled by addMediaMessage which shows the player
        }

        // ----------------------------------------------
        // FETCH ANNOUNCEMENTS
        // ----------------------------------------------
        async function fetchAnnouncements() {
            try {
                const response = await fetch('/api/announcements');
                const data = await response.json();
                if (data.announcements && data.announcements.length > 0) {
                    data.announcements.forEach(ann => {
                        if (seenAnnouncements.has(ann.id)) return;
                        seenAnnouncements.add(ann.id);
                        const div = document.createElement('div');
                        div.className = 'message system';
                        div.innerHTML = `${ann.from}: ${ann.message}`;
                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'time';
                        timeSpan.textContent = new Date(ann.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        div.appendChild(timeSpan);
                        messagesContainer.appendChild(div);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    });
                }
            } catch (e) { console.error('Announcement fetch error:', e); }
        }

        // ----------------------------------------------
        // FETCH GROUP MESSAGES
        // ----------------------------------------------
        async function fetchGroupMessages() {
            try {
                const response = await fetch('/api/groupmessages');
                const data = await response.json();
                if (data.groupMessages && data.groupMessages.length > 0) {
                    data.groupMessages.forEach(msg => {
                        if (seenGroupMessages.has(msg.id)) return;
                        seenGroupMessages.add(msg.id);
                        const div = document.createElement('div');
                        div.className = 'message group';
                        div.innerHTML = `<div class="sender">💬 ${msg.username}</div>${msg.message}`;
                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'time';
                        timeSpan.textContent = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        div.appendChild(timeSpan);
                        messagesContainer.appendChild(div);
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    });
                }
            } catch (e) { console.error('Group messages fetch error:', e); }
        }

        // ----------------------------------------------
        // SEND MESSAGE
        // ----------------------------------------------
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            typingIndicator.style.display = 'block';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, username, message: text })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';

                if (data.action === 'download') {
                    // Show the media with player
                    addMediaMessage(data.reply, data.filename, data.file, data.mimeType);
                } else if (data.reply) {
                    addMessage(data.reply, 'bot');
                }

                if (data.announcement) {
                    seenAnnouncements.add(data.announcement.id);
                    const div = document.createElement('div');
                    div.className = 'message system';
                    div.innerHTML = `${data.announcement.from}: ${data.announcement.message}`;
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'time';
                    timeSpan.textContent = new Date(data.announcement.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    div.appendChild(timeSpan);
                    messagesContainer.appendChild(div);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                const match = data.reply ? data.reply.match(/Downloads left:\s*(♾️ Unlimited|\d+)/) : null;
                if (match) {
                    userStatus.textContent = `◆ ${username} | ${match[1]} left`;
                }

            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage('❌ Server connection lost. Retry.', 'bot');
                console.error('Send error:', error);
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        console.log(`✅ Nexus initialized. User: ${username} (${userId})`);
    </script>
</body>
</html>
